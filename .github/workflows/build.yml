name: Build Harmony (.NET 9.0)  
  
on:  
  push:  
    branches: [ main ]  
  pull_request:  
    branches: [ main ]  
  workflow_dispatch:  
  
jobs:  
  build:  
    runs-on: ubuntu-latest  
  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
        with:  
          submodules: recursive        # 修复：初始化 iced 等嵌套子模块  
  
      - name: Setup .NET 9.0  
        uses: actions/setup-dotnet@v4  
        with:  
          dotnet-version: '9.0.x'  
  
      - name: Restore  
        run: dotnet "$DOTNET_ROOT/sdk/$(dotnet --version)/MSBuild.dll" Lib.Harmony.Thin/Lib.Harmony.Thin.csproj /t:Restore /p:Configuration=Release  
        # 修复：去掉 /p:TargetFrameworks=net9.0，让各子项目按自身定义的框架 restore  
        # 否则 MonoMod.SourceGen.Internal (netstandard2.0) 的 assets 文件会被错误生成为 net9.0  
  
      - name: Build  
        run: dotnet "$DOTNET_ROOT/sdk/$(dotnet --version)/MSBuild.dll" Lib.Harmony.Thin/Lib.Harmony.Thin.csproj /t:Build /p:Configuration=Release /p:TargetFrameworks=net9.0  
  
      - name: Verify target framework is net9.0  
        run: |  
          DLL="Lib.Harmony.Thin/bin/Release/net9.0/0Harmony.dll"  
          if strings "$DLL" | grep -q "NETCoreApp,Version=v9.0"; then  
            echo "PASS: 0Harmony.dll targets .NET 9.0"  
          else  
            echo "FAIL: target framework mismatch"  
            strings "$DLL" | grep "NETCoreApp" || true  
            exit 1  
          fi  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: 0Harmony-net9.0  
          path: Lib.Harmony.Thin/bin/Release/net9.0/
